<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Prosa</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2ec; --bg2: #ede9e1;
    --ink: #1a1714; --ink2: #4a4540; --ink3: #8a837a;
    --accent: #8b3a1e; --accent2: #c9531f;
    --border: rgba(26,23,20,0.12); --border2: rgba(26,23,20,0.22);
    --panel: #faf8f4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1a1714; --bg2:#221f1b;
      --ink:#ede9e1; --ink2:#b8b2a8; --ink3:#7a7570;
      --accent:#d4623a; --accent2:#e8845a;
      --border:rgba(237,233,225,0.1); --border2:rgba(237,233,225,0.2);
      --panel:#1e1b18;
    }
  }
  body { font-family:'Georgia',serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; }
  header { background:var(--bg2); border-bottom:1px solid var(--border2); padding:13px 22px; display:flex; align-items:baseline; gap:14px; }
  header h1 { font-size:19px; font-weight:400; font-style:italic; color:var(--accent); }
  header p { font-size:11px; color:var(--ink3); font-family:sans-serif; }
  .layout { display:grid; grid-template-columns:1fr 310px; flex:1; min-height:0; height:calc(100vh - 46px); }
  .editor-area { display:flex; flex-direction:column; border-right:1px solid var(--border); min-height:0; }
  .toolbar { display:flex; align-items:center; gap:7px; padding:6px 16px; background:var(--bg2); border-bottom:1px solid var(--border); flex-wrap:wrap; flex-shrink:0; }
  .tool-label { font-family:sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink3); }
  .toggle-btn { padding:3px 10px; font-size:11px; font-family:sans-serif; border:1px solid var(--border2); border-radius:20px; background:transparent; color:var(--ink2); cursor:pointer; transition:all 0.15s; }
  .toggle-btn:hover { border-color:var(--ink3); }
  .toggle-btn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 16px; flex-shrink:0; }
  .tab { padding:8px 13px; font-family:sans-serif; font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--ink3); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .editor-pane { flex:1; padding:20px 24px; display:none; overflow-y:auto; min-height:0; }
  .editor-pane.active { display:block; }
  #textarea-input { width:100%; min-height:100%; background:transparent; border:none; outline:none; font-family:'Georgia',serif; font-size:17px; line-height:1.85; color:var(--ink); resize:none; caret-color:var(--accent); }
  #textarea-input::placeholder { color:var(--ink3); font-style:italic; }
  .rendered-text { font-family:'Georgia',serif; font-size:17px; line-height:1.95; color:var(--ink); }

  .fl-1 { background:rgba(0,200,100,0.62); border-radius:2px; }
  .fl-2 { background:rgba(210,190,0,0.65); border-radius:2px; }
  .fl-3 { background:rgba(255,120,0,0.70); border-radius:2px; }
  .fl-4 { background:rgba(255,0,140,0.66); border-radius:2px; }
  .fl-5 { background:rgba(200,0,30,0.68); border-radius:2px; }

  .vm { border-radius:2px; padding:0 2px; cursor:default; position:relative; display:inline; }
  .vm:hover .tt { display:block; }
  .tt { display:none; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--bg); font-family:sans-serif; font-size:10px; padding:2px 6px;
    border-radius:3px; white-space:nowrap; pointer-events:none; z-index:300; }

  /* Verb-type classes — base (panel: transparent bg, colored text) */
  .vt-indefinido3s { --vtc: #ff9d9d; background:rgba(210,0,0,1);  color:var(--vtc); }
  .vt-indefinido   { --vtc:#8E8EEAFF; background:rgba(0,0,190,1); color:var(--vtc); }
  .vt-imperfecto1  { --vtc: #642a00; background:rgba(255,110,0,1);color:var(--vtc); }
  .vt-imperfecto23 { --vtc:#4dff4d; background:rgba(0,153,0,1);  color:var(--vtc); }
  .vt-futuro       { --vtc:#003180; background:rgba(0,100,255,1);color:var(--vtc); }
  .vt-condicional  { --vtc:#007aaa; background:rgba(0,180,230,1);color:var(--vtc); }
  .vt-subjuntivo   { --vtc:#db9dfa; background:rgba(160,0,230,1);color:var(--vtc); }
  .vt-participio   { --vtc:#007a55; background:rgba(0,200,140,1);color:var(--vtc); }
  .vt-gerundio     { --vtc: #FAA7D4; background:rgba(230,0,160,1);color:var(--vtc); }
  .vt-infinitivo   { --vtc: #206a20; background:rgba(150,220,0,1);color:var(--vtc); }
  .vt-presente     { --vtc:#007722; background:rgba(0,190,70,1); color:var(--vtc); }
  /* In rendered-text: solid background + border, inherit text color */
  .rendered-text .vm               { border-bottom:1.5px solid var(--vtc); color:var(--vtc); }
  .rendered-text .vt-indefinido3s  { background:rgba(210,0,0,1); }
  .rendered-text .vt-indefinido    { background:rgba(0,0,190,1); }
  .rendered-text .vt-imperfecto1   { background:rgba(255,110,0,1); }
  .rendered-text .vt-imperfecto23  { background:rgba(0,153,0,1); }
  .rendered-text .vt-futuro        { background:rgba(0,100,255,1); }
  .rendered-text .vt-condicional   { background:rgba(0,180,230,1); }
  .rendered-text .vt-subjuntivo    { background:rgba(160,0,230,1); }
  .rendered-text .vt-participio    { background:rgba(0,200,140,1); }
  .rendered-text .vt-gerundio      { background:rgba(230,0,160,1); }
  .rendered-text .vt-infinitivo    { background:rgba(150,220,0,1);  }
  .rendered-text .vt-presente      { background:rgba(0,190,70,1); }

  .sidebar { background:var(--panel); overflow-y:auto; display:flex; flex-direction:column; border-left:1px solid var(--border); }
  .sidebar-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  .sidebar-section h3 { font-family:sans-serif; font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--ink3); margin-bottom:9px; }
  .stat-row { display:flex; justify-content:space-between; padding:3px 0; font-family:sans-serif; }
  .stat-row .label { font-size:12px; color:var(--ink2); }
  .stat-row .val { font-size:12px; font-family:monospace; color:var(--ink); }
  .legend-item { display:flex; align-items:center; gap:6px; padding:3px 0; font-family:sans-serif; font-size:11px; color:var(--ink2); }
  .legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .legend-count { margin-left:auto; font-family:monospace; font-size:10px; color:var(--ink3); }
  .sparkbar { width:100%; height:28px; display:flex; gap:2px; margin:7px 0 3px; align-items:flex-end; }
  .sparkbar-col { flex:1; border-radius:2px 2px 0 0; min-height:2px; }
  .btn-analyze { display:block; margin:0 0 12px; padding:8px 12px; background:var(--accent); color:#fff; border:none; border-radius:4px; font-family:sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:background 0.2s; width:100%; }
  .btn-analyze:hover { background:var(--accent2); }
  .btn-analyze:disabled { background:var(--ink3); cursor:not-allowed; }
  .error-item { padding:7px 8px; border-left:3px solid var(--accent); background:rgba(139,58,30,0.06); margin-bottom:5px; border-radius:0 3px 3px 0; }
  .etype { font-family:sans-serif; font-size:9px; letter-spacing:0.5px; text-transform:uppercase; color:var(--ink3); margin-bottom:2px; }
  .efrag { font-size:13px; font-weight:bold; }
  .esug { font-family:sans-serif; font-size:12px; color:#27ae60; margin-top:2px; }
  .enota { font-family:sans-serif; font-size:11px; color:var(--ink3); margin-top:2px; }
  .empty-state { font-family:sans-serif; font-size:11px; color:var(--ink3); font-style:italic; padding:4px 0; }
  .vgroup-title { font-family:sans-serif; font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; margin:8px 0 3px; padding:2px 6px; border-radius:3px; }
  .vchips { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
  .vchip { font-family:'Georgia',serif; font-size:12px; padding:1px 7px; border-radius:20px; }
  .api-notice { font-family:sans-serif; font-size:10px; color:var(--ink3); padding:4px 7px; background:rgba(139,58,30,0.07); border-radius:3px; margin-bottom:8px; }
  .spinner { display:inline-block; width:11px; height:11px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .seg-label { font-family:sans-serif; font-size:11px; color:var(--ink2); display:flex; align-items:center; gap:5px; margin-left:auto; }
  .seg-label input { accent-color:var(--accent); cursor:pointer; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>
<header>
  <h1>Analizador de Prosa</h1>
  <p>análisis estilístico · castellano</p>
</header>
<div class="layout">
  <div class="editor-area">
    <div class="toolbar">
      <span class="tool-label">Vista</span>
      <button class="toggle-btn on" id="btn-plain" onclick="setView('plain')">Texto</button>
      <button class="toggle-btn" id="btn-frases" onclick="setView('frases')">Longitud frases</button>
      <button class="toggle-btn" id="btn-verbos" onclick="setView('verbos')">Verbos</button>
      <label class="seg-label" id="lbl-seg" style="display:none">
        <input type="checkbox" id="chk-seg" onchange="renderView()"> Separar proposiciones
      </label>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('input')">Editar</div>
      <div class="tab" onclick="switchTab('rendered')">Analizado</div>
    </div>
    <div class="editor-pane active" id="pane-input">
      <textarea id="textarea-input" placeholder="Pega o escribe tu texto aquí…" oninput="onTextChange()"></textarea>
    </div>
    <div class="editor-pane" id="pane-rendered">
      <div id="rendered-text" class="rendered-text"></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Estadísticas</h3>
      <div class="stat-row"><span class="label">Palabras</span><span class="val" id="st-w">—</span></div>
      <div class="stat-row"><span class="label">Frases</span><span class="val" id="st-s">—</span></div>
      <div class="stat-row"><span class="label">Sílabas totales</span><span class="val" id="st-sy">—</span></div>
      <div class="stat-row"><span class="label">Síl./frase (media)</span><span class="val" id="st-av">—</span></div>
      <div class="stat-row"><span class="label">Flesch-Szigriszt</span><span class="val" id="st-fl">—</span></div>
      <div class="stat-row"><span class="label">Flow</span><span class="val" id="st-flow">—</span></div>
    </div>
    <div class="sidebar-section" id="sec-fr" style="display:none">
      <h3>Distribución longitud</h3>
      <div class="sparkbar" id="spark"></div>
      <div id="leg-fr"></div>
      <p style="font-family:sans-serif;font-size:9px;color:var(--ink3);margin-top:5px">clusters: 1–6 · 7–20 · 21–40 · 41+ sílabas</p>
    </div>
    <div class="sidebar-section" id="sec-vb" style="display:none">
      <h3>Verbos por forma</h3>
      <div id="verb-panel"></div>
    </div>
    <div class="sidebar-section" id="sec-ort">
      <h3>Ortografía y gramática</h3>
      <input id="api-key-input" type="password" placeholder="API key de Anthropic…"
        oninput="localStorage.setItem('anthropic-api-key',this.value)"
        style="width:100%;padding:5px 8px;margin-bottom:8px;font-family:sans-serif;font-size:11px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);color:var(--ink);outline:none;">
      <button class="btn-analyze" id="btn-ort" onclick="runOrtografia()">Analizar texto</button>
      <div id="ort-result"><p class="empty-state">Aún no analizado</p></div>
    </div>
  </div>
</div>
<script>
const SAMPLE = `Velilla entró en la habitación detrás de su bastón. A su espalda, los mercenarios nevios se quedaron en el umbral, apoyados en el marco, observando a las presas que llevaban acechando hace rato: Lucilda con el bebé en brazos, Guzmán con la espalda en la pared. El viejo cruzó la estancia despacio, sin apartar los ojos del muchacho. Arrastraba los pies con esa parsimonia de quien ha dejado de tener prisa porque sabe que el tiempo, a cierta edad, ya no corre sino que camina a su lado. Se detuvo a un paso de Guzmán. Lo miró. Guzmán le devolvió la mirada sin moverse. Lo contará si pudiese`;

const LS_KEY = 'analizador-texto';
const ta = document.getElementById('textarea-input');
ta.value = localStorage.getItem(LS_KEY) ?? SAMPLE;
const storedKey = localStorage.getItem('anthropic-api-key');
if(storedKey) document.getElementById('api-key-input').value = storedKey;
let currentView = 'plain';
let AD = null; // analysis data

// ══════════════════════════════════════════════════════
//  SYLLABLE COUNTER
// ══════════════════════════════════════════════════════
function sylCount(word) {
  word = word.toLowerCase().replace(/[^a-záéíóúüñ]/g,'');
  if (!word) return 0;
  const V='aeiouáéíóúü', STRONG='aeoáéó', ACC_WEAK='íú';
  const DIPH=new Set(['ia','ie','io','iu','ua','ue','ui','uo',
    'ai','ei','oi','au','eu','ou','ái','éi','ói','áu','éu',
    'iá','ié','ió','uá','ué','uó']);
  const TRIPH=new Set(['iai','iei','uai','uei','uau','iau']);
  let c=0,i=0;
  while(i<word.length){
    if(V.includes(word[i])){
      if(i+2<word.length&&TRIPH.has(word.slice(i,i+3))){c++;i+=3;}
      else if(i+1<word.length&&V.includes(word[i+1])){
        const p=word.slice(i,i+2);
        const hiato=(STRONG.includes(word[i])&&STRONG.includes(word[i+1]))
          ||word[i]===word[i+1]||ACC_WEAK.includes(word[i+1])||ACC_WEAK.includes(word[i]);
        if(hiato){c++;i++;}
        else if(DIPH.has(p)){c++;i+=2;}
        else{c++;i++;}
      }else{c++;i++;}
    }else i++;
  }
  return c||1;
}

function segSyl(seg){ return seg.trim().split(/\s+/).filter(Boolean).reduce((s,w)=>s+sylCount(w),0); }
function sylClass(n){ return n<=6?1:n<=15?2:n<=25?3:n<=40?4:5; }

// Flow score (0–100): 80% nPVI (local rhythm) + 20% tanh(SD/16) (global range).
// nPVI_raw = 100/(n-1) × Σ |d_i – d_{i+1}| / ((d_i + d_{i+1}) / 2)  → divide by 2 → 0–100
// SD_norm  = tanh(SD / 16) × 100  (k=16 chosen so SD=30 ≈ 95%)
function flowScore(syls){
  if(syls.length<2)return 0;
  const n=syls.length;
  // nPVI component
  let sum=0;
  for(let i=0;i<n-1;i++){
    const a=syls[i],b=syls[i+1];
    if(a+b===0)continue;
    sum+=Math.abs(a-b)/((a+b)/2);
  }
  const nPVI=Math.min(100, 100/(n-1)*sum/2);
  // SD component
  const mean=syls.reduce((s,v)=>s+v,0)/n;
  const sd=Math.sqrt(syls.reduce((s,v)=>s+(v-mean)**2,0)/(n-1));
  const sdNorm=Math.tanh(sd/16)*100;
  return Math.round(0.8*nPVI + 0.2*sdNorm);
}
function flowLabel(s){ return s<=25?'bajo':s<=60?'medio':s<=80?'bueno':s<=90?'alto':'óptimo'; }

// ══════════════════════════════════════════════════════
//  SENTENCE & PROPOSITION SPLITTING
// ══════════════════════════════════════════════════════
function splitSentences(text){
  return text.split(/(?<=[.!?…]+)\s+/).map(s=>s.trim()).filter(Boolean);
}

function splitPropositions(sent){
  // split on , ; : — – preserving delimiter with left part
  const parts = sent.split(/([,;:\u2014\u2013])/);
  const segs=[];
  let cur='';
  for(let i=0;i<parts.length;i++){
    if(/^[,;:\u2014\u2013]$/.test(parts[i])){cur+=parts[i];if(cur.replace(/[,;:\u2014\u2013\s]/g,''))segs.push(cur);cur='';}
    else cur+=parts[i];
  }
  if(cur.replace(/[,;:\u2014\u2013\s]/g,''))segs.push(cur);
  return segs.length?segs:[sent];
}

// ══════════════════════════════════════════════════════
//  VERB DETECTION  — token-level, no regex on HTML
// ══════════════════════════════════════════════════════

// All verb type definitions ordered by specificity (most specific first)
const VT = [
  { key:'indefinido3s', cls:'vt-indefinido3s', label:'Pret. indef. 3ª sing.',
    suf:['ó'] },
  { key:'indefinido',   cls:'vt-indefinido',   label:'Pret. indefinido (resto)',
    suf:['é','aste','iste','asteis','aron','ieron','imos','isteis'] },
  { key:'imperfecto1',  cls:'vt-imperfecto1',  label:'Pret. imperf. 1ª (-aba)',
    suf:['ábamos','abais','aban','abas','aba'] },
  { key:'imperfecto23', cls:'vt-imperfecto23', label:'Pret. imperf. 2ª/3ª (-ía)',
    suf:['íamos','íais','ían','ías','ía'] },
  { key:'futuro',       cls:'vt-futuro',       label:'Futuro',
    suf:['aremos','aréis','arán','arás','ará','eremos','eréis','erán','erás','erá','iremos','iréis','irán','irás','irá','aré','eré','iré'] },
  { key:'condicional',  cls:'vt-condicional',  label:'Condicional',
    suf:['aríamos','aríais','arían','arías','aría','eríamos','eríais','erían','erías','ería','iríamos','iríais','irían','irías','iría'] },
  { key:'subjuntivo',   cls:'vt-subjuntivo',   label:'Subjuntivo',
    suf:['ásemos','ésemos','áramos','éramos','áremos','éremos',
         'aseis','eseis','areis','ereis',
         'asen','esen','aren','eren',
         'ases','eses','ares','eres',
         'aras','eras','ara','era','ase','ese','are','ere'] },
  { key:'participio',   cls:'vt-participio',   label:'Participio',
    suf:['adas','idos','idas','ados','ada','ido','ida','ado',
         'uerto','ierto','iesto','rito','cho','sto','echa','echo'] },
  { key:'gerundio',     cls:'vt-gerundio',     label:'Gerundio',
    suf:['ándose','iéndose','yendo','ando','iendo'] },
  { key:'infinitivo',   cls:'vt-infinitivo',   label:'Infinitivo',
    suf:['arse','erse','irse','ar','er','ir'] },
  { key:'presente',     cls:'vt-presente',     label:'Presente',
    suf:['amos','emos','imos','áis','éis','ís'] },
];

// Irregular verb forms — explicit whitelist
const IRR = {
  indefinido3s: new Set(['fue','vio','dio','hizo','dijo','trajo','puso','tuvo','vino','supo','quiso','anduvo',
    'entró','salió','volvió','llegó','siguió','cayó','oyó','creyó',
    'durmió','murió','pidió','repitió','sintió','mintió',
    'miró','cruzó','arrastró','detuvo','devolvió']),
  indefinido: new Set(['fui','fuiste','fuimos','fuisteis','fueron',
    'vi','viste','vimos','visteis','vieron',
    'di','diste','dimos','disteis','dieron',
    'hice','hiciste','hicimos','hicisteis','hicieron',
    'dije','dijiste','dijimos','dijisteis','dijeron',
    'traje','trajiste','trajimos','trajisteis','trajeron',
    'puse','pusiste','pusimos','pusisteis','pusieron',
    'tuve','tuviste','tuvimos','tuvisteis','tuvieron',
    'vine','viniste','vinimos','vinisteis','vinieron',
    'supe','supiste','supimos','supisteis','supieron',
    'quise','quisiste','quisimos','quisisteis','quisieron',
    'anduve','anduviste','anduvimos','anduvisteis','anduvieron']),
  presente: new Set(['es','son','somos','sois','eres','hay','ha','han','has','hemos','habéis',
    'va','van','voy','vas','vais','vamos','sé','sabe','saben','sabemos','sabéis','sabes',
    'puede','pueden','puedo','puedes','podemos','podéis',
    'quiere','quieren','quiero','quieres','queremos','queréis',
    'tiene','tienen','tengo','tienes','tenemos','tenéis',
    'dice','dicen','digo','dices','decimos','decís',
    'hace','hacen','hago','haces','hacemos','hacéis',
    've','ven','veo','ves','vemos','veis',
    'viene','vienen','vengo','vienes','venimos','venís',
    'pone','ponen','pongo','pones','ponemos','ponéis']),
  imperfecto1: new Set(['estaba','estabas','estábamos','estabais','estaban',
    'llevaba','llevabas','llevaban','miraba','mirabas','miraban',
    'hablaba','pensaba','arrastraba']),
  imperfecto23: new Set(['era','eras','éramos','erais','eran',
    'tenía','tenías','teníamos','teníais','tenían',
    'había','habías','habíamos','habíais','habían',
    'podía','podías','podían','quería','querías','querían',
    'sabía','sabías','sabían','veía','veías','veían',
    'venía','venías','venían','hacía','hacías','hacían',
    'vivía','vivías','vivían','sentía','sentías','sentían',
    'decía','decías','decían','traía','traías','traían']),
};

// Hard stopword list — anything here is NEVER a verb
const SW = new Set([
  'el','la','los','las','un','una','unos','unas','del','al',
  'con','por','para','sin','sobre','desde','hasta','bajo','ante','tras',
  'en','de','a','y','o','u','e','que','si','se','me','te','le','nos','os','lo','les',
  'mas','pero','sino','aunque','como','cuando','donde','quien','cual','cuya','cuyo',
  'muy','tan','bien','mal','ya','aún','más','menos','todo','todos','toda','todas',
  'este','esta','estos','estas','ese','esa','esos','esas','aquel','aquella','aquellos','aquellas',
  'mi','tu','su','mis','tus','sus','nuestro','nuestra','vuestro','vuestra',
  'no','ni','sí','también','tampoco','pues','porque','antes','después','luego',
  'entonces','así','aquí','allí','allá','ahí','hoy','ayer','siempre','nunca','jamás',
  'quizás','algo','nada','nadie','alguien','cada','otro','otra','otros','otras',
  // false positives — nouns/adjectives that match verb suffixes
  'agua','aire','apellido','barrera','bastón','bebé','brazo','brazos',
  'calle','cartera','casa','comida','cualquiera','día','edad','entrada',
  'era','eras','espalda','estancia','estar','forma','fuego','guarida',
  'haber','habitación','herida','lado','lugar','luz','madera','manera',
  'mañana','marco','medida','mercenario','mercenarios','mesa','mirada','modo',
  'momento','muchacho','mundo','nevio','nevios','noche','ojos','pared',
  'parsimonia','parte','partes','partida','paso','pecho','pedido','pies','presa',
  'presas','primera','puerta','rato','ruido','salida','segundo','sentido',
  'ser','sido','silla','suelo','tarde','techo','tercera','tiempo',
  'tierra', 'todavía','umbral','últimos','ventana','vez','veces','vida',
  // proper names
  'escroc','guzmán','karquia','lucilda','reinor','velilla',
]);

// Minimum length per suffix type to reduce false positives
const MIN_SYL_LEN = { indefinido3s:2, indefinido:3, imperfecto1:4, imperfecto23:3, futuro:5, condicional:6,
  subjuntivo:4, participio:3, gerundio:5, infinitivo:3, presente:4 };

function classifyToken(raw) {
  const t = raw.toLowerCase().replace(/[^a-záéíóúüñ]/g,'');
  if (t.length < 2) return null;
  if (SW.has(t)) return null;

  // 1. Check explicit irregulars
  for (const [key,set] of Object.entries(IRR)) {
    if (set.has(t)) return key;
  }

  // 2. Check suffix patterns — ordered most-specific first
  for (const vt of VT) {
    const minLen = MIN_SYL_LEN[vt.key] || 3;
    if (t.length < minLen + 1) continue;
    for (const suf of vt.suf) {
      if (t.length > suf.length + 1 && t.endsWith(suf)) {
        const stem = t.slice(0, t.length - suf.length);
        // stem must have at least 2 chars and contain a vowel (ensures it's a real stem)
        if (stem.length >= 2 && /[aeiouáéíóúü]/.test(stem)) return vt.key;
      }
    }
  }
  return null;
}

// Tokenizer: splits into {text, isWord} preserving everything
function tokenize(text) {
  const rx = /([a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+(?:[-'][a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+)*)|([^a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+)/g;
  const toks = []; let m;
  while ((m = rx.exec(text)) !== null) toks.push({ text:m[0], isWord:!!m[1] });
  return toks;
}

// ══════════════════════════════════════════════════════
//  ANALYSIS
// ══════════════════════════════════════════════════════
function analyze() {
  const text = document.getElementById('textarea-input').value;
  if (!text.trim()) return null;
  const sents = splitSentences(text);
  const syls = sents.map(segSyl);
  const dist = [0,0,0,0,0]; syls.forEach(n=>dist[sylClass(n)-1]++);
  const words = text.split(/\s+/).filter(Boolean);
  const totSyl = words.reduce((s,w)=>s+sylCount(w),0);
  const avg = sents.length ? (totSyl/sents.length).toFixed(1) : 0;
  const flesch = Math.max(0,Math.min(100,Math.round(206.84-0.60*(totSyl/words.length*10)-1.02*(sents.length/words.length*100))));
  const vbt = {}; VT.forEach(v=>vbt[v.key]=[]);
  tokenize(text).forEach(t=>{ if(!t.isWord)return; const k=classifyToken(t.text); if(k)vbt[k].push(t.text); });
  const flow=flowScore(syls);
  return { sents, syls, dist, totSyl, avg, nw:words.length, flesch, flow, vbt };
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════
//  STATS & PANEL UPDATES
// ══════════════════════════════════════════════════════
function updateStats(){
  if(!AD)return;
  const fl = AD.flesch>=75?' fácil':AD.flesch>=50?' normal':' difícil';
  document.getElementById('st-w').textContent=AD.nw;
  document.getElementById('st-s').textContent=AD.sents.length;
  document.getElementById('st-sy').textContent=AD.totSyl;
  document.getElementById('st-av').textContent=AD.avg;
  document.getElementById('st-fl').textContent=AD.flesch+' ·'+fl;
  document.getElementById('st-flow').textContent=AD.flow+' · '+flowLabel(AD.flow);
}

const F_COLORS=['#00b850','#b8a800','#ff6a00','#e6007a','#c0001e'];
const F_BGS=['rgba(0,200,100,0.32)','rgba(210,190,0,0.38)','rgba(255,120,0,0.30)','rgba(255,0,140,0.26)','rgba(200,0,30,0.28)'];
const F_LABELS=['1–6 síl','7–15 síl','16–25 síl','26–40 síl','41+ síl'];

function updateFrPanel(){
  if(!AD)return;
  const max=Math.max(...AD.dist,1);
  document.getElementById('spark').innerHTML=AD.dist.map((d,i)=>
    `<div class="sparkbar-col" style="background:${F_COLORS[i]};height:${Math.round((d/max)*26)+2}px"></div>`).join('');
  document.getElementById('leg-fr').innerHTML=AD.dist.map((d,i)=>
    `<div class="legend-item"><div class="legend-dot" style="background:${F_BGS[i]};border:1.5px solid ${F_COLORS[i]}"></div><span>${F_LABELS[i]}</span><span class="legend-count">${d}</span></div>`).join('');
}

function updateVbPanel(){
  if(!AD)return;
  let html='';
  VT.forEach(vt=>{
    const list=[...new Set(AD.vbt[vt.key])];
    if(!list.length)return;
    html+=`<div class="vgroup-title ${vt.cls}">${vt.label}</div>`;
    html+=`<div class="vchips">${list.map(v=>`<span class="vchip ${vt.cls}">${esc(v)}</span>`).join('')}</div>`;
  });
  document.getElementById('verb-panel').innerHTML=html||'<p class="empty-state">No se detectaron verbos</p>';
}

// ══════════════════════════════════════════════════════
function renderView(){
  const text=document.getElementById('textarea-input').value;
  const el=document.getElementById('rendered-text');
  if(!text||!AD){el.textContent=text;return;}

  if(currentView==='plain'){el.textContent=text;return;}

  if(currentView==='frases'){
    const useProp=document.getElementById('chk-seg').checked;
    let html='';
    AD.sents.forEach((sent,si)=>{
      const segs=useProp?splitPropositions(sent):[sent];
      segs.forEach(seg=>{
        const n=segSyl(seg), cl=sylClass(n);
        html+=`<span class="fl-${cl}" title="${n} sílabas">${esc(seg)}</span>`;
      });
      html+=' ';
    });
    el.innerHTML=html;
    return;
  }

  if(currentView==='verbos'){
    // Build HTML token-by-token — never run regex on HTML strings
    let html='';
    tokenize(text).forEach(tok=>{
      if(!tok.isWord){html+=esc(tok.text);return;}
      const key=classifyToken(tok.text);
      if(!key){html+=esc(tok.text);return;}
      const vt=VT.find(v=>v.key===key);
      html+=`<span class="vm ${vt.cls}"><span class="tt">${vt.label}</span>${esc(tok.text)}</span>`;
    });
    el.innerHTML=html;
  }
}

// ══════════════════════════════════════════════════════
//  VIEW / TAB CONTROL
// ══════════════════════════════════════════════════════
function setView(v){
  currentView=v;
  ['plain','frases','verbos'].forEach(n=>document.getElementById('btn-'+n).classList.toggle('on',n===v));
  document.getElementById('sec-fr').style.display=(v==='frases')?'block':'none';
  document.getElementById('sec-vb').style.display=(v==='verbos')?'block':'none';
  document.getElementById('lbl-seg').style.display=(v==='frases')?'flex':'none';
  if(v!=='plain'){
    AD=analyze(); updateStats();
    if(v==='frases')updateFrPanel();
    if(v==='verbos')updateVbPanel();
    renderView(); switchTab('rendered');
  }else switchTab('input');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='input')||(i===1&&tab==='rendered')));
  document.getElementById('pane-input').classList.toggle('active',tab==='input');
  document.getElementById('pane-rendered').classList.toggle('active',tab==='rendered');
  if(tab==='rendered'){AD=analyze();updateStats();renderView();}
}

function onTextChange(){
  localStorage.setItem(LS_KEY, ta.value);
  AD=analyze();updateStats();if(currentView!=='plain')renderView();
}

// ══════════════════════════════════════════════════════
//  ORTOGRAFÍA (API)
// ══════════════════════════════════════════════════════
async function runOrtografia(){
  const text=document.getElementById('textarea-input').value.trim();
  if(!text)return;
  const btn=document.getElementById('btn-ort');
  const res=document.getElementById('ort-result');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Analizando…'; res.innerHTML='';
  try{
    const apiKey=localStorage.getItem('anthropic-api-key')||'';
    if(!apiKey){res.innerHTML='<p class="empty-state">Introduce tu API key de Anthropic.</p>';return;}
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`Eres un corrector de estilo literario en castellano. Analiza el texto e identifica: errores ortográficos, gramaticales, de concordancia, de puntuación, y repetición léxica excesiva en proximidad.
Responde SOLO con JSON válido sin backticks ni texto adicional:
{"errores":[{"tipo":"ortografía|gramática|puntuación|concordancia|repetición","fragmento":"texto original","sugerencia":"corrección","nota":"explicación"}],"resumen":"frase resumen general"}
Si no hay errores: {"errores":[],"resumen":"Sin errores detectados"}`,
        messages:[{role:'user',content:text}]
      })
    });
    const data=await r.json();
    const raw=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    let parsed; try{parsed=JSON.parse(raw);}catch(e){res.innerHTML='<p class="empty-state">Respuesta no parseable.</p>';return;}
    if(!parsed.errores.length){
      res.innerHTML=`<div style="color:#27ae60;font-family:sans-serif;font-size:12px;padding:5px 0">✓ ${esc(parsed.resumen)}</div>`;return;
    }
    let html=`<div style="font-family:sans-serif;font-size:10px;color:var(--ink3);margin-bottom:7px">${esc(parsed.resumen)}</div>`;
    parsed.errores.forEach(e=>{
      html+=`<div class="error-item"><div class="etype">${esc(e.tipo)}</div><div class="efrag">«${esc(e.fragmento)}»</div><div class="esug">→ ${esc(e.sugerencia)}</div><div class="enota">${esc(e.nota)}</div></div>`;
    });
    res.innerHTML=html;
  }catch(err){res.innerHTML='<p class="empty-state">Error al conectar con la API.</p>';}
  finally{btn.disabled=false;btn.textContent='Analizar texto';}
}

// Init
AD=analyze();updateStats();
</script>
